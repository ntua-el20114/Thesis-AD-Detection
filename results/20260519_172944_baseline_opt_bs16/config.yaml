# Paths
gemma_dir:       ~/Thesis/data/MultiConAD/gemma
trill_dir:       ~/Thesis/data/MultiConAD/trillsson
train_jsonl:     ~/Thesis/data/MultiConAD/train_English.jsonl
test_jsonl:      ~/Thesis/data/MultiConAD/test_English.jsonl
results_dir:     ~/Thesis/results

# Experiment
experiment_name: baseline_opt_bs16
experiment_description: "Baseline experiment after the hyperparameter optimization. Here, batch size=16. We might have to increase it and re-run HPO."
base_seed: 24
n_runs: 5

# Embedding dims
audio_dim: 1024
text_dim:  768

# Model
n_classes: 3
d_model:   512
n_heads:   4
n_layers:  2
dropout:   0.1
patience:  8

# Training
device:     cuda
batch_size: 16
lr:         0.0001
epochs:     30

# Hyperparameter Optiomization
hpo_epochs: 20 
hpo_trials: 50
