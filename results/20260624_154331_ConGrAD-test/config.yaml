# Paths
gemma_dir:        ~/Thesis/data/MultiConAD/gemma
trill_dir:        ~/Thesis/data/MultiConAD/trillsson
speakers_json:    ~/Thesis/data/MultiConAD/speakers.json
train_jsonl:      ~/Thesis/data/MultiConAD/train_English.jsonl
test_jsonl:       ~/Thesis/data/MultiConAD/test_English.jsonl
results_dir:      ~/Thesis/results
pretrained_model: null

# Experiment
experiment_name: ConGrAD-test
experiment_description: "ConGrAD, reverted some bad changes"
base_seed: 24
n_runs: 5
report_gpu: false # I might remove this

# Embedding dims
audio_dim: 1024
text_dim:  768

# Model
n_classes:    3
d_model:      128
ca_heads:     4
ca_layers:    1
rgat_heads:   4
rgat_layers:  2
graph_window: 5

# Regularization
dropout:      0.5
drop_edge:    0.1
patience:     15
weight_decay: 0.0001

# Domain-Adversarial Training
adv_lambda: 0.0   # weight of adversarial loss; set 0.0 to disable DANN
n_domains:  9     # number of distinct corpora present in training data

# Training
device:     cuda
batch_size: 16
lr:         0.0001
epochs:     60

# Data Augmentation
balanced_mixup: false
mixup_alpha:    0.4

# Visualization
visualizations: true

# Hyperparameter Optimization
hpo_epochs: 20
hpo_trials: 50
